<!DOCTYPE html>
<html lang='en'>
  <script>
    // Reduces flickering by setting the head style to the same
    // background color as the theme (default theme is light mode)
    document.head.insertAdjacentHTML(
      "beforeend",
      `<style>body{background:${localStorage.getItem('bg-color')}}</style>`
    )
  </script>
  <head>
    <title>Simple MtG Proxies</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&display=swap" rel="stylesheet">
    <link
      rel='icon'
      type='image/svg+xml'
      href='https://svgs.scryfall.io/card-symbols/R.svg'
    >
  </head>
  <body class='preload'>
    <div id='app'></div>
  </body>
</html>
