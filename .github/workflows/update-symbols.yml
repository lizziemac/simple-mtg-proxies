name: Update Symbols

on:
  workflow_dispatch:

jobs:
  update-symbols:
    name: Update Symbols
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Generate a token
        id: generate-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ vars.LIGHTNING_MACLEAN_APP_ID }}
          private-key: ${{ secrets.LIGHTNING_MACLEAN_APP_PRIVATE_KEY }}

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run symbol fetch script
        run: python scripts/add_svgs.py

      - name: Create pull request
        env:
          GITHUB_TOKEN: ${{ steps.generate-token.outputs.token }}
        run: |
          branch="update-scryfall-symbols"
          git config user.name "lightning-maclean[bot]"
          git config user.email "lightning-maclean[bot]@users.noreply.github.com"

          # Create or switch to branch
          git checkout -B "$branch"

          # Stage updated files
          git add app/assets/scryfall/symbols

          # Only commit if there are changes
          if ! git diff --cached --quiet; then
            git commit -m "Update Scryfall symbol SVGs"
            git push --force --set-upstream origin "$branch"

            # Create or update PR
            gh pr create \
              --title "Update Scryfall Symbols" \
              --body "Automated update of Scryfall symbol SVGs and TypeScript rebuild." \
              --head "$branch" \
              --base main || \
            gh pr edit "$branch" --title "Update Scryfall Symbols" --body "Updated Scryfall symbol SVGs and TypeScript rebuild."
          else
            echo "No changes detected, skipping PR creation."
          fi